<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="style.css">
    <title>Pokédex</title>
</head>
<body>

<!-- TOPBAR Módulos de navegación -->
<nav class="topbar">
    <div class="topbar-container">
        <div class="topbar-logo" onclick="navigateTo('catalogo')">
            <span class="logo-poke">Poké</span><span class="logo-dex">Dex</span>
        </div>
        <div class="topbar-menu">
            <button class="topbar-btn" data-module="catalogo" onclick="navigateTo('catalogo')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                Catálogo
            </button>
            <button class="topbar-btn" data-module="movimientos" onclick="navigateTo('movimientos')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2 L12 6 M12 18 L12 22 M4 4 L7 7 M17 17 L20 20 M4 20 L7 17 M17 7 L20 4 M2 12 L6 12 M18 12 L22 12"/><circle cx="12" cy="12" r="3"/></svg>
                Movimientos
            </button>
            <button class="topbar-btn" data-module="equipo" onclick="navigateTo('equipo')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M12 2 L15 9 L22 9 L16.5 14 L18.5 21 L12 16.5 L5.5 21 L7.5 14 L2 9 L9 9 Z"/></svg>
                Mi Equipo
            </button>
            <button class="topbar-btn" data-module="usuario" onclick="navigateTo('usuario')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><circle cx="12" cy="8" r="4"/><path d="M5 20 L5 17 C5 13.5 8 11 12 11 C16 11 19 13.5 19 17 L19 20"/></svg>
                Usuario
            </button>
        </div>
        <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
    </div>
</nav>

<!-- CONTAINER principal -->
<main id="appContainer">
    <!-- CATALOGO VIEW -->
    <div id="catalogoView" class="view active">
        <div class="catalogo-header">
            <div class="filters-bar">
                <input type="text" id="catalogoSearch" placeholder="Buscar por nombre o número..." class="filter-input">
                <select id="tipoFilter" class="filter-select">
                    <option value="">Todos los tipos</option>
                </select>
                <select id="generacionFilter" class="filter-select">
                    <option value="">Todas las generaciones</option>
                </select>
            </div>
        </div>
        <div class="pokemon-grid-container">
            <div class="grid-header">
                <h2>Pokédex</h2>
                <span id="gridCount" class="grid-count">Cargando...</span>
            </div>
            <div class="pokemon-grid" id="pokemonGrid">
                <div class="loading-spinner">Cargando Pokédex...</div>
            </div>
            <div class="pagination-controls">
                <button class="page-nav-btn" id="firstPageBtn"><<</button>
                <button class="page-nav-btn" id="prevPageBtn"><</button>
                <div class="page-info">
                    <span id="currentPageDisplay">1</span>
                    <span class="page-separator">/</span>
                    <span id="totalPagesDisplay">--</span>
                </div>
                <button class="page-nav-btn" id="nextPageBtn">></button>
                <button class="page-nav-btn" id="lastPageBtn">>></button>
            </div>
        </div>
    </div>

    <!-- DETAIL VIEW -->
    <div id="detalleView" class="view hidden">
        <div id="pokeCardDetail"></div>
        <div class="back-button-wrap">
            <button class="back-to-catalog" onclick="navigateTo('catalogo')">← Volver al catálogo</button>
        </div>
    </div>

    <!-- MOVEMENTS VIEW (sin buscador específico) -->
    <div id="movimientosView" class="view hidden">
        <div class="moves-module">
            <div class="catalogo-header">
                <div class="filters-bar"></div>
                    <select id="moveTypeFilter" class="filter-select">
                        <option value="">Todos los tipos</option>
                    </select>
                </div>
            </div>
            <div class="pokemon-grid-container">
                <div class="grid-header">
                    <h2>Movimientos</h2>
                    <span id="movesGridCount" class="grid-count">Cargando...</span>
                </div>
                <div class="moves-grid" id="movesGrid">
                    <div class="loading-spinner">Cargando movimientos...</div>
                </div>
                <div class="pagination-controls">
                    <button class="page-nav-btn" id="movesFirstPageBtn"><<</button>
                    <button class="page-nav-btn" id="movesPrevPageBtn"><</button>
                    <div class="page-info">
                        <span id="movesCurrentPageDisplay">1</span>
                        <span class="page-separator">/</span>
                        <span id="movesTotalPagesDisplay">--</span>
                    </div>
                    <button class="page-nav-btn" id="movesNextPageBtn">></button>
                    <button class="page-nav-btn" id="movesLastPageBtn">>></button>
                </div>
            </div>
        </div>
    </div>

    <!-- USERS VIEW -->
    <div id="usuarioView" class="view hidden">
        <div class="user-module">
            <div id="loginPanel" class="login-panel">
                <h2>Acceso Entrenador</h2>
                <input type="text" id="loginUsername" placeholder="Nombre de entrenador">
                <input type="password" id="loginPassword" placeholder="Contraseña (cualquier cosa)">
                <button onclick="doLogin()">Iniciar sesión</button>
                <p class="login-note">Cualquier nombre y contraseña funcionan</p>
            </div>
            <div id="userPanel" class="user-panel hidden">
                <div class="user-info">
                    <span>Bienvenido, <strong id="userNameDisplay"></strong>!</span>
                    <button onclick="doLogout()" class="logout-btn">Cerrar sesión</button>
                </div>
                <div class="team-summary">
                    <p>Tu equipo: <span id="teamCount">0</span>/6 Pokémon</p>
                    <button onclick="navigateTo('equipo')" class="view-team-btn">Ver mi equipo</button>
                </div>
            </div>
        </div>
    </div>

    <!-- TEAM VIEW -->
    <div id="equipoView" class="view hidden">
        <div class="team-module">
            <h2 class="titulo-Team">Mi equipo Pokémon</h2>
            <div id="teamContainer" class="team-grid">
                <div class="empty-team">No tienes Pokémon en tu equipo. Ve al catálogo y agrega algunos.</div>
            </div>
            <div class="back-button-wrap">
                <button class="back-to-catalog" onclick="navigateTo('catalogo')">Regresar al catálogo</button>
            </div>
        </div>
    </div>
</main>

<!-- LOADER GLOBAL -->
<div id="loader" class="loader hidden"></div>

<template id="pokemonDetailTemplate">
  <div class="hero-section">
    <div class="hero-bg-type"></div>
    <div class="hero-content">
      <div class="hero-right">
        <div class="sprite-frames">
          <div class="sprite-container">
            <img class="sprite-img" alt="">
            <span class="sprite-label">Normal</span>
          </div>
          <div class="sprite-container">
            <img class="sprite-img" alt="">
            <span class="sprite-label">Shiny</span>
          </div>
        </div>
      </div>
      <div class="hero-left">
        <div class="poke-id"></div>
        <h1 class="poke-name"></h1>
        <div class="type-badges"></div>
        <div class="generation-badge"></div>
        <div class="basic-stats">
          <div class="basic-stat"><span class="bstat-label">Peso</span><span class="bstat-val"></span></div>
          <div class="basic-stat"><span class="bstat-label">Altura</span><span class="bstat-val"></span></div>
          <div class="basic-stat"><span class="bstat-label">Exp. Base</span><span class="bstat-val"></span></div>
        </div>
        <div class="abilities-section">
          <span class="section-mini-title">Habilidades</span>
          <div class="abilities-list"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" data-tab="stats">Estadísticas</button>
    <button class="tab-btn" data-tab="evolutions">Evoluciones</button>
    <button class="tab-btn" data-tab="moves">Movimientos</button>
  </div>
  <div class="tab-content active" id="tab-stats">
    <h2 class="section-title">Estadísticas de Combate</h2>
    <div class="stats-grid" id="statsGridDetail"></div>
    <div class="stat-total-wrap"><span class="stat-total-label">TOTAL</span><span class="stat-total-val" id="statTotalDetail">—</span></div>
  </div>
  <div class="tab-content" id="tab-evolutions">
    <h2 class="section-title">Cadena de Evolución</h2>
    <div class="evo-chain" id="evoChainDetail"></div>
  </div>
  <div class="tab-content" id="tab-moves">
    <h2 class="section-title">Movimientos por Nivel</h2>
    <div class="moves-grid" id="movesGridDetail"></div>
  </div>
  <div class="add-to-team-footer" id="teamFooter"></div>
</template>

<script src="script.js"></script>
</body>
</html>
